<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Type1Skills Ideas Radar</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f6f2;
        color: #161616;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 18px 48px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
      }

      p {
        color: #4b4b4b;
        margin: 8px 0 0;
      }

      .lanes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 24px;
      }

      article {
        background: #ffffff;
        border: 1px solid #dedbd2;
        border-radius: 8px;
        padding: 14px;
      }

      article span {
        color: #666;
        display: block;
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      article strong {
        display: block;
        font-size: 2rem;
        margin-top: 8px;
      }

      code {
        background: #ebe8df;
        border-radius: 6px;
        padding: 2px 6px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #151515;
          color: #f5f2ea;
        }

        p {
          color: #c8c0b1;
        }

        article {
          background: #202020;
          border-color: #36342f;
        }

        article span {
          color: #b7ad9e;
        }

        code {
          background: #2d2b27;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p>Type1Skills plugin</p>
      <h1>Ideas Radar</h1>
      <p>Accepted, incubating, inbox, and rejected ideas in one static cockpit.</p>

      <section class="lanes" aria-label="Idea lanes">
        <article>
          <span>Accepted</span>
          <strong id="accepted">0</strong>
        </article>
        <article>
          <span>Incubating</span>
          <strong id="incubating">0</strong>
        </article>
        <article>
          <span>Inbox</span>
          <strong id="inbox">0</strong>
        </article>
        <article>
          <span>Rejected</span>
          <strong id="rejected">0</strong>
        </article>
      </section>

      <p>Generate <code>.type1skills/ideas-radar/snapshot.json</code> to load live data.</p>
    </main>
    <script>
      const fallbackSnapshot = {
        summary: {
          accepted: 0,
          incubating: 0,
          inbox: 0,
          rejected: 0
        }
      };

      function render(snapshot) {
        for (const lane of ['accepted', 'incubating', 'inbox', 'rejected']) {
          document.getElementById(lane).textContent = String(snapshot.summary?.[lane] || 0);
        }
      }

      fetch('../snapshot.json')
        .then((response) => response.ok ? response.json() : fallbackSnapshot)
        .catch(() => fallbackSnapshot)
        .then(render);
    </script>
  </body>
</html>
